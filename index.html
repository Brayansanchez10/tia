<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/img/icono.ico" type="image/x-icon" sizes="any" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="Marketing — Pop: carpintería y ebanistería, línea retail, instalación y contacto por WhatsApp."
    />
    <title>Marketing — Pop</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('site-theme')
          var theme = t === 'light' || t === 'dark' ? t : 'dark'
          document.documentElement.dataset.theme = theme
          document.documentElement.style.colorScheme = theme === 'light' ? 'light' : 'dark'
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
